<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>跳轉中...</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      background: #f0f0f0;
    }
    .box {
      text-align: center;
      color: #555;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #ddd;
      border-top-color: #06c755;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error { display: none; color: #e00; margin-top: 12px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>識別身份中，請稍候...</p>
    <p id="error"></p>
  </div>

  <script>
    const LIFF_ID = "1532961204-7sEjWV7C";

    function showError(msg) {
      document.getElementById("error").style.display = "block";
      document.getElementById("error").textContent = msg;
    }

    function getRedirectUrl() {
      const params = new URLSearchParams(location.search);
      const redirect = params.get("redirect");
      if (!redirect) return null;

      try {
        // 安全性：只允許 http/https 開頭
        const url = new URL(redirect);
        if (!["http:", "https:"].includes(url.protocol)) return null;
        return url;
      } catch {
        return null;
      }
    }

    async function main() {
      const redirectUrl = getRedirectUrl();
      if (!redirectUrl) {
        showError("缺少 redirect 參數，請確認連結是否正確。");
        return;
      }

      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: location.href });
          return;
        }

        const profile = await liff.getProfile();
        const lineUid = profile.userId;

        // 將 LINE UID 附加到目標網址
        redirectUrl.searchParams.set("line_uid", lineUid);

        // 跳轉
        location.replace(redirectUrl.toString());

      } catch (err) {
        console.error(err);
        showError("發生錯誤：" + err.message);
      }
    }

    main();
  </script>
</body>
</html>
